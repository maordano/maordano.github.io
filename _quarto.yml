project:
  type: website
  output-dir: docs

website:
  title: "Mariano Ordano"
  navbar:
    title: "Portada Galería"
    background: dark
    foreground: light
    left: []
    right:
      - href: blog.qmd
        text: Bitácora
      - href: proyectos.qmd
        text: Proyectos
      - href: about.qmd
        text: Acerca de
      - text: "🌐"
        href: "https://translate.google.com/translate?sl=es&tl=en&u=https%3A%2F%2Fmaordano.github.io"
        target: "_blank" 

    include-after-body: 
      text: |
        <!-- Contenedor del Traductor de Google -->
        <div id="idioma-contenedor" style="position: fixed; bottom: 20px; left: 20px; z-index: 1000; background: #fff; padding: 6px 12px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 8px;">
          <span style="font-family: 'Roboto', sans-serif; font-size: 0.9rem; color: #495057; font-weight: 500;">Idioma / Language:</span>
          <div id="google_translate_element"></div>
        </div>

        <!-- Botones Nativos de Accesibilidad -->
        <div id="accesibilidad-contenedor" style="position: fixed; bottom: 70px; left: 20px; z-index: 1000; background: #fff; padding: 6px 12px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.15); display: flex; gap: 10px; align-items: center;">
          <span style="font-family: 'Roboto', sans-serif; font-size: 0.9rem; color: #495057; font-weight: 500;">Accesibilidad:</span>
          <button onclick="toggleContraste()" style="cursor: pointer; background: #f8f9fa; border: 1px solid #ccc; padding: 2px 8px; border-radius: 3px; font-size: 0.85rem;">🌓 Contraste</button>
          <button onclick="toggleTexto()" style="cursor: pointer; background: #f8f9fa; border: 1px solid #ccc; padding: 2px 8px; border-radius: 3px; font-size: 0.85rem;">🔍 Letra A+</button>
        </div>

        <!-- Lógica de funcionamiento (JavaScript) -->
        <script>
          function toggleContraste() {
            document.body.classList.toggle('alto-contraste');
          }
          function toggleTexto() {
            document.body.classList.toggle('texto-grande');
          }
        </script>
   
  page-footer:
    background: dark
    left: |
      [CC BY 4.0](https://creativecommons.org/licenses/by/4.0/) 2026 Mariano Ordano v1.4
    center: "hecho con [Quarto](https://quarto.org)"
    right:
      - icon: github
        href: https://github.com/maordano/
        aria-label: GitHub
      - text: "OSF"
        href: https://osf.io/9yxfm/
      - icon: linkedin
        href: https://www.linkedin.com/in/mariano-ordano
        aria-label: LinkedIn
      - text: "RG"
        href: https://www.researchgate.net/profile/Mariano-Ordano
      - icon: instagram
        href: https://instagram.com/mariano.ordano/
        aria-label: Instagram
      - text: "CV"
        href: https://drive.google.com/file/d/1fwCgR2HiVTTu7CEI3Vsi1gWZcUNglawJ/view

format:
  html:
    theme: cosmo
    css: styles.css
    
execute:
  freeze: true

