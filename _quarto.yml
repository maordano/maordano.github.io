project:
  type: website
  output-dir: docs

website:
  title: "Mariano Ordano"
  navbar:
    background: dark
    foreground: light
    left: []
    right:
      - href: blog.qmd
        text: Bitácora
      - href: proyectos.qmd
        text: Proyectos
      - href: about.qmd
        text: Acerca de
      - text: "🌐 .en"  # Agregada la marca del idioma actual/destino junto al globo terráqueo
        href: "https://translate.google.com/translate?sl=es&tl=en&u=https%3A%2F%2Fmaordano.github.io"
        target: "_blank" 
   
  page-footer:
    background: dark
    left: |
      [CC BY 4.0](https://creativecommons.org/licenses/by/4.0/) 2026 Mariano Ordano v1.4
    # BOTONES DISCRETOS DE ACCESIBILIDAD INTEGRADOS AL PIE DE PÁGINA (Sin flotantes molestos)
    center: |
      hecho con [Quarto](https://quarto.org) | 
      <button onclick="toggleContraste()" class="btn-acc">🌓 Contraste</button> | 
      <button onclick="toggleTexto()" class="btn-acc">🔍 Letra A+</button>
    right:
      - icon: github
        href: https://github.com/maordano/
        aria-label: GitHub
      - text: "OSF"
        href: https://osf.io/9yxfm/
      - icon: linkedin
        href: https://www.linkedin.com/in/mariano-ordano
        aria-label: LinkedIn
      - text: "RG"
        href: https://www.researchgate.net/profile/Mariano-Ordano
      - icon: instagram
        href: https://instagram.com/mariano.ordano/
        aria-label: Instagram
      - text: "CV"
        href: https://drive.google.com/file/d/1fwCgR2HiVTTu7CEI3Vsi1gWZcUNglawJ/view

format:
  html:
    theme: cosmo
    css: styles.css
    # LA UBICACIÓN CORRECTA PARA LA LÓGICA DE PROGRAMACIÓN DE LA ACCESIBILIDAD:
    include-after-body:
      text: |
        <script>
          function toggleContraste() {
            document.body.classList.toggle('alto-contraste');
          }
          function toggleTexto() {
            document.body.classList.toggle('texto-grande');
          }
        </script>
    
execute:
  freeze: true
