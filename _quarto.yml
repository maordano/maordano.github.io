format:
  html:
    theme: cosmo
    css: styles.css
    # JAVASCRIPT AVANZADO PARA FILTROS VISUALES Y SÍNTESIS DE VOZ NATIVA
    include-after-body:
      text: |
        <script>
          // 1. Lógica de cambios en Hue, Chroma y Brightness
          function cambiarPercepcion(modo) {
            // Limpiar clases previas
            document.body.classList.remove('alto-contraste', 'filtro-suave', 'daltonismo');
            if (modo !== 'normal') {
              document.body.classList.add(modo);
            }
          }

          // 2. Lógica de Transcripción a Voz Nativa (Web Speech API)
          let lector = null;
          function toggleTextoAVoz() {
            let boton = document.getElementById('btn-voz');
            if ('speechSynthesis' in window) {
              if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                boton.innerText = "🔊 Escuchar Página";
                boton.style.color = "";
              } else {
                // Capturar el texto limpio de la página principal
                let texto = document.querySelector('main')?.innerText || document.body.innerText;
                lector = new SpeechSynthesisUtterance(texto);
                lector.lang = 'es-AR'; // Español rioplatense/argentino
                
                lector.onend = function() {
                  boton.innerText = "🔊 Escuchar Página";
                  boton.style.color = "";
                };

                window.speechSynthesis.speak(lector);
                boton.innerText = "🛑 Detener Lectura";
                boton.style.color = "#ff4757"; // Alerta visual discreta de reproducción
              }
            } else {
              alert("Tu navegador no soporta transcripción de voz automática.");
            }
          }
        </script>
    
execute:
  freeze: true
