project:
  type: website
  output-dir: docs

website:
  title: "Mariano Ordano"
  navbar:
    title: "Portada · Galería"
    background: dark
    foreground: light
    left: []
    right:
      - href: blog.qmd
        text: Bitácora
      - href: proyectos.qmd
        text: Proyectos
      - href: about.qmd
        text: Acerca de
      - text: "🌐"
        menu:
          - text: "Seleccionar idioma"
            href: "#"
  page-footer:
    background: dark
    left: |
      [CC BY 4.0](https://creativecommons.org/licenses/by/4.0/) 2026 Mariano Ordano | v1.0 Quarto
    right:
      - icon: github
        href: https://github.com/maordano/
        aria-label: GitHub
      - icon: linkedin
        href: https://www.linkedin.com/in/mariano-ordano
        aria-label: LinkedIn
      - text: "OSF"
        href: https://osf.io/9yxfm/
      - text: "RG"
        href: https://www.researchgate.net/profile/Mariano-Ordano
      - icon: instagram
        href: https://instagram.com/mariano.ordano/
        aria-label: Instagram
      - text: "CV"
        href: https://drive.google.com/file/d/1fwCgR2HiVTTu7CEI3Vsi1gWZcUNglawJ/view

format:
  html:
    theme: cosmo
    css: styles.css
    include-in-header:
      text: |
        <script type="text/javascript">
          function googleTranslateElementInit() {
            new google.translate.TranslateElement({
              pageLanguage: 'es',
              includedLanguages: 'es,en,pt,fr,it,de,ru,zh-CN,ja,ar,qu,gn,no,sv,da,fi,nl,pl,ko,hi,ca,eu,tr,sw,he',
              layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
              autoDisplay: false
            }, 'google_translate_element');
          }
        </script>
        <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
        <style>
          #google_translate_element {
            position: static !important;
            background: transparent !important;
          }
          #google_translate_element select {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 3px;
            font-size: 0.8rem;
            padding: 0.2rem 0.4rem;
            cursor: pointer;
            color: white;
          }
          .goog-te-gadget { font-size: 0 !important; }
          .goog-te-gadget select { margin: 0 !important; }
          .navbar-dark { background-color: #1a1a2e !important; }
        </style>
    include-after-body:
      text: |
        <div id="google_translate_element" style="display:none;"></div>

execute:
  freeze: true
