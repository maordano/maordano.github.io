
<style>
  #translate-btn {
    position: fixed;
    top: 0.6rem;
    right: 1rem;
    z-index: 9999;
    background: none;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    line-height: 1;
  }
  #translate-panel {
    display: none;
    position: fixed;
    top: 2.8rem;
    right: 1rem;
    z-index: 9999;
    background: #1a1a2e;
    border-radius: 6px;
    padding: 0.5rem;
    min-width: 180px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  #translate-panel select {
    background: #1a1a2e;
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 3px;
    font-size: 0.85rem;
    padding: 0.3rem 0.5rem;
    width: 100%;
    cursor: pointer;
  }
  .goog-te-gadget { font-size: 0 !important; }
  .goog-te-gadget select { margin: 0 !important; }
</style>

<button id="translate-btn" title="Traducir / Translate" onclick="
  var p = document.getElementById('translate-panel');
  p.style.display = p.style.display === 'block' ? 'none' : 'block';
">🌐</button>

<div id="translate-panel">
  <div id="google_translate_element"></div>
</div>

<script type="text/javascript">
function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: "es",
    includedLanguages: "es,en,pt,fr,it,de,ru,zh-CN,ja,ar,qu,gn,no,sv,da,fi,nl,pl,ko,hi,ca,eu,tr,sw,he",
    layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
    autoDisplay: false
  }, "google_translate_element");
}
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
